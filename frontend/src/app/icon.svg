<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#bg)"/>
  <!-- Film icon (simplified clapperboard / film strip) -->
  <!-- Outer film frame -->
  <rect x="6" y="9" width="20" height="14" rx="2" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Film holes left -->
  <rect x="7.5" y="11" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="7.5" y="15" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="7.5" y="19" width="2" height="2" rx="0.5" fill="white"/>
  <!-- Film holes right -->
  <rect x="22.5" y="11" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="22.5" y="15" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="22.5" y="19" width="2" height="2" rx="0.5" fill="white"/>
  <!-- Play triangle in centre -->
  <polygon points="14,13 14,19 20,16" fill="white"/>
</svg>
