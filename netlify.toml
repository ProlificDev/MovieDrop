[build]
  base    = "frontend"
  command = "npm run build"
  publish = "frontend/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Proxy /api/* → Railway backend (update URL after Railway deployment)
[[redirects]]
  from   = "/api/*"
  to     = "https://moviedrop-backend.up.railway.app/api/:splat"
  status = 200
  force  = true

[build.environment]
  NODE_VERSION = "20"
